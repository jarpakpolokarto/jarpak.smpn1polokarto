<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Jarpak</title>
	<link rel="stylesheet" href="../jarpak_2026_web_style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>

<body>
    <header id="global_header"></header>

    <section class="deproject-desc-section">
        <div class="deproject-container">
            <h1 class="page-title">Math Tales</h1>
            <p class="deproject-decs">
                Math Tales merupakan media pembelajaran matematika berbasis
                cerita interaktif yang dirancang untuk membantu siswa
                memahami konsep matematika dengan lebih menarik.
            </p>
		</div>
	</section>
	
	<section class="deproject-gallery-section">
		<div class="deproject-container">
			<h2 class="deproject-section-title">Gallery of Champions</h2>
			<div class="deproject-champ-cat">
				<h3 class="deproject-champ-title">Juara Terbaik</h3>
				<div class="deproject-gallery-grid">
					<img src="images/komik_lanscape_1.jpg" alt="Juara Terbaik 1">
					<img src="images/komik_lanscape_3.jpg" alt="Juara Terbaik 2">
					<img src="images/komik_lanscape_2.jpg" alt="Juara Terbaik 3">
				</div>
			</div>
			
			<div class="deproject-champ-cat">
				<h3 class="deproject-champ-title">Juara Terfavorit</h3>
				<div class="deproject-gallery-grid">
					<img src="images/komik_lanscape_4.jpg" alt="Juara Terfavorit 1">
					<img src="images/komik_lanscape_5.jpg" alt="Juara Terfavorit 2">
					<img src="images/komik_potrait_1.jpg" alt="Juara Terfavorit 3">
				</div>
			</div>
		</div>
	</section>
	
	<section class="deproject-flipbook-section">
		<div class="deproject-container">
			<h2 class="deproject-section-title">Comic Book</h2>
			<div class="deproject-flipbook-container">
				<iframe allowfullscreen="allowfullscreen" allow="clipboard-write" scrolling="no" class="fp-iframe" src="https://heyzine.com/flip-book/d3357c5676.html" style="border: 1px solid lightgray;border-radius: 12px; width: 100%; height: 400px;"></iframe>
            </div>
		</div>
	</section>

    <footer id="main-footer"></footer>

    <script src="../jarpak_2026_web_script.js"></script>
</body>
</html>
